get:
  operationId: checkContrast
  summary: Check color contrast ratio
  tags: [Branding]
  parameters:
    - name: fg
      in: query
      required: true
      schema:
        type: string
    - name: bg
      in: query
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Contrast result
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/branding/ContrastCheckResponse.yaml'

    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'