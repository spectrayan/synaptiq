type: object
description: Credential reference for data source authentication
properties:
  type:
    $ref: '../common/enums/CredentialType.yaml'
  secretRef:
    type: string
    description: Secret identifier (GCP secret name, Vault path, or MongoDB doc ID)
  oauthProvider:
    type: string
    description: OAuth2 provider name (only for OAUTH2 type)
