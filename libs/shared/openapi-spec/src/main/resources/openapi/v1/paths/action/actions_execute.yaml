post:
  operationId: executeAction
  summary: Execute an action
  tags: [Actions]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/action/ExecuteActionRequest.yaml'
  responses:
    '200':
      description: Action result
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/action/ActionResultResponse.yaml'

    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'