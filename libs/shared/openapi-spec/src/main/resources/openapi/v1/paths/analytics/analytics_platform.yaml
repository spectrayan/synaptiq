get:
  operationId: getPlatformRollup
  summary: Get platform-wide rollup
  tags: [Analytics]
  parameters:
    - name: from
      in: query
      schema:
        type: string
        format: date
    - name: to
      in: query
      schema:
        type: string
        format: date
  responses:
    '200':
      description: Platform rollup
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/analytics/PlatformRollupResponse.yaml'

    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'