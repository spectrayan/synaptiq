get:
  operationId: getBranding
  summary: Get branding config
  tags: [Branding]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
  responses:
    '200':
      description: Branding config
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/branding/BrandingResponse.yaml'
    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'
patch:
  operationId: updateBranding
  summary: Update branding
  tags: [Branding]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/branding/BrandingResponse.yaml'
  responses:
    '200':
      description: Branding updated
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/branding/BrandingResponse.yaml'

    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'