get:
  operationId: getWorkflow
  summary: Get a workflow
  tags: [Workflows]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
    - name: workflowId
      in: path
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Workflow details
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/workflow/WorkflowResponse.yaml'
    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'
    '404':
      $ref: '../../components/responses/NotFound.yaml'
patch:
  operationId: updateWorkflow
  summary: Update a workflow
  tags: [Workflows]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
    - name: workflowId
      in: path
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/workflow/SaveWorkflowRequest.yaml'
  responses:
    '200':
      description: Workflow updated
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/workflow/WorkflowResponse.yaml'
    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'
    '404':
      $ref: '../../components/responses/NotFound.yaml'
delete:
  operationId: deleteWorkflow
  summary: Delete a workflow
  tags: [Workflows]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
    - name: workflowId
      in: path
      required: true
      schema:
        type: string
  responses:
    '204':
      description: Workflow deleted

    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'
    '404':
      $ref: '../../components/responses/NotFound.yaml'