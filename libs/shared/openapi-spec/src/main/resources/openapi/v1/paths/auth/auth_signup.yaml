post:
  operationId: signup
  summary: Register a new user
  tags: [Auth]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/auth/SignupRequest.yaml'
  responses:
    '201':
      description: User created
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/auth/UserResponse.yaml'
    '409':
      $ref: '../../components/responses/Conflict.yaml'
