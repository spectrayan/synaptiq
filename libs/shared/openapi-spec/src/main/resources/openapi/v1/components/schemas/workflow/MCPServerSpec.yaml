type: object
description: MCP server connection configuration
properties:
  id:
    type: string
  transport:
    type: string
    enum: [STDIO, HTTP, WS]
    default: STDIO
  command:
    type: string
  args:
    type: array
    items:
      type: string
  env:
    type: object
    additionalProperties:
      type: string
  url:
    type: string
