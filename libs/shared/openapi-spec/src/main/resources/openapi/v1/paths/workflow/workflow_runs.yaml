get:
  operationId: listWorkflowRuns
  summary: List execution runs for a workflow
  tags: [Workflows]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
    - name: workflowId
      in: path
      required: true
      schema:
        type: string
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 20
  responses:
    '200':
      description: List of workflow run summaries
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../components/schemas/workflow/WorkflowRunSummary.yaml'
