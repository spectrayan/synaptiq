type: object
description: Data source schema definition (inferred or manually defined)
properties:
  schemaName:
    type: string
  fields:
    type: array
    items:
      type: object
      properties:
        fieldId:
          type: string
        label:
          type: string
        type:
          type: string
        required:
          type: boolean
        searchable:
          type: boolean
        displayable:
          type: boolean
        filterable:
          type: boolean
        displayOrder:
          type: integer
        enumValues:
          type: array
          items:
            type: string
  schemaVersion:
    type: integer
  autoInferred:
    type: boolean
