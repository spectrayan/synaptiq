post:
  operationId: saveWorkflow
  summary: Save a workflow
  tags: [Workflows]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/workflow/SaveWorkflowRequest.yaml'
  responses:
    '201':
      description: Workflow saved
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/workflow/WorkflowResponse.yaml'

    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'