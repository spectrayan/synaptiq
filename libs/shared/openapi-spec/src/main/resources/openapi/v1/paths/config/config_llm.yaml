get:
  operationId: getLlmConfig
  summary: Get llm config
  tags: [Config]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
  responses:
    '200':
      description: Config data
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/config/LlmProviderResponse.yaml'
patch:
  operationId: updateLlmConfig
  summary: Update llm config
  tags: [Config]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/config/LlmProviderResponse.yaml'
  responses:
    '200':
      description: Config updated
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/config/LlmProviderResponse.yaml'
