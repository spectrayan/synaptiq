patch:
  operationId: updateSession
  summary: Update session
  tags: [Chat]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
    - name: sessionId
      in: path
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/chat/UpdateSessionRequest.yaml'
  responses:
    '200':
      description: Session updated
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/chat/SessionResponse.yaml'
    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'
    '404':
      $ref: '../../components/responses/NotFound.yaml'
delete:
  operationId: deleteSession
  summary: Delete session
  tags: [Chat]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
    - name: sessionId
      in: path
      required: true
      schema:
        type: string
  responses:
    '204':
      description: Session deleted

    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'
    '404':
      $ref: '../../components/responses/NotFound.yaml'