get:
  operationId: getGuardrailsConfig
  summary: Get guardrails config
  tags: [Config]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
  responses:
    '200':
      description: Config data
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/config/GuardrailsResponse.yaml'
patch:
  operationId: updateGuardrailsConfig
  summary: Update guardrails config
  tags: [Config]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/config/GuardrailsResponse.yaml'
  responses:
    '200':
      description: Config updated
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/config/GuardrailsResponse.yaml'
