post:
  operationId: importCatalogItems
  summary: Import catalog items from CSV
  tags: [Catalog]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          type: object
          properties:
            file:
              type: string
              format: binary
  responses:
    '200':
      description: Import results
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/catalog/CatalogImportResponse.yaml'

    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'