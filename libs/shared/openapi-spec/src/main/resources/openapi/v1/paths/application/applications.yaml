get:
  operationId: listApplications
  summary: List applications for a tenant
  tags: [Applications]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
  responses:
    '200':
      description: Application list
      content:
        application/json:
          schema:
            type: object
            properties:
              applications:
                type: array
                items:
                  $ref: '../../components/schemas/application/ApplicationResponse.yaml'
    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'
post:
  operationId: createApplication
  summary: Create a new application
  tags: [Applications]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/application/CreateApplicationRequest.yaml'
  responses:
    '201':
      description: Application created
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/application/ApplicationResponse.yaml'

    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'