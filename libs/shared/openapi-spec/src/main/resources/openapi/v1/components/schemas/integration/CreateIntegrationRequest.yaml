type: object
description: Request to create a new integration
required:
  - name
  - connectorType
properties:
  name:
    type: string
    minLength: 1
    maxLength: 200
  description:
    type: string
    maxLength: 1000
  connectorType:
    $ref: '../common/enums/ConnectorType.yaml'
  templateId:
    type: string
    description: Built-in template ID to instantiate (e.g., "rest-api-poll", "slack-notify")
  parameters:
    type: object
    additionalProperties:
      type: string
    description: Key-value parameters for the template or adapter
  credentialRef:
    type: string
    description: Reference to credential/secret for authentication
