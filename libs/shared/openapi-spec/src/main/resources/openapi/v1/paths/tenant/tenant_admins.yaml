get:
  operationId: listTenantAdmins
  summary: List tenant admins
  tags: [Tenants]
  parameters:
    - name: tenantId
      in: path
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Admin list
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../components/schemas/tenant/TenantAdminResponse.yaml'
    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'
post:
  operationId: inviteAdmin
  summary: Invite a tenant admin
  tags: [Tenants]
  parameters:
    - name: tenantId
      in: path
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/tenant/InviteAdminRequest.yaml'
  responses:
    '201':
      description: Admin invited
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/tenant/TenantAdminResponse.yaml'

    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'