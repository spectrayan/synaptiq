post:
  operationId: testIntegrationConnection
  summary: Test integration connectivity
  description: Validates the configuration and tests connectivity without activating the route
  tags: [Integrations]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
    - name: routeConfigId
      in: path
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Connection test result
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/integration/ConnectionTestResponse.yaml'
    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '404':
      $ref: '../../components/responses/NotFound.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'
