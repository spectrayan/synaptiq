type: object
description: Create a new application
required:
  - name
  - slug
properties:
  name:
    type: string
    minLength: 1
    maxLength: 200
  slug:
    type: string
    minLength: 1
    maxLength: 100
    pattern: '^[a-z0-9-]+$'
  description:
    type: string
    maxLength: 500
  icon:
    type: string
    maxLength: 100
  isDefault:
    type: boolean
    default: false
  aiPersona:
    $ref: '../config/AiPersonaResponse.yaml'
  guardrails:
    $ref: '../config/GuardrailsResponse.yaml'
  branding:
    $ref: '../branding/BrandingResponse.yaml'
  components:
    $ref: '../config/ComponentsToggleResponse.yaml'
  actions:
    $ref: '../config/ActionsConfigResponse.yaml'
  personalization:
    $ref: '../branding/PersonalizationResponse.yaml'
  themes:
    type: array
    items:
      $ref: '../branding/ThemePresetResponse.yaml'
  dataSourceIds:
    type: array
    items:
      type: string
  llmOverride:
    $ref: '../config/LlmProviderResponse.yaml'
