post:
  operationId: postChatMessage
  summary: Send a chat message (SSE stream)
  tags: [Chat]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/chat/ChatMessageRequest.yaml'
  responses:
    '200':
      description: SSE stream of chat events
      content:
        text/event-stream:
          schema:
            type: string

    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'