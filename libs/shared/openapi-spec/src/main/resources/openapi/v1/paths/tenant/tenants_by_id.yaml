get:
  operationId: getTenant
  summary: Get tenant by ID
  tags: [Tenants]
  parameters:
    - name: tenantId
      in: path
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Tenant details
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/tenant/TenantResponse.yaml'
    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'
    '404':
      $ref: '../../components/responses/NotFound.yaml'
patch:
  operationId: updateTenant
  summary: Update tenant
  tags: [Tenants]
  parameters:
    - name: tenantId
      in: path
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/tenant/UpdateTenantRequest.yaml'
  responses:
    '200':
      description: Tenant updated
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/tenant/TenantResponse.yaml'

    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'
    '404':
      $ref: '../../components/responses/NotFound.yaml'