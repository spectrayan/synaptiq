get:
  operationId: getTenant
  summary: Get tenant by ID
  tags: [Tenants]
  parameters:
    - name: tenantId
      in: path
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Tenant details
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/tenant/TenantResponse.yaml'
patch:
  operationId: updateTenant
  summary: Update tenant
  tags: [Tenants]
  parameters:
    - name: tenantId
      in: path
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/tenant/UpdateTenantRequest.yaml'
  responses:
    '200':
      description: Tenant updated
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/tenant/TenantResponse.yaml'
