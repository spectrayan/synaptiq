post:
  operationId: regeneratePrompt
  summary: Regenerate a system prompt for a workflow node using AI
  tags: [Workflows]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/workflow/RegeneratePromptRequest.yaml'
  responses:
    '200':
      description: Regenerated prompt
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/workflow/RegeneratePromptResponse.yaml'

    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'