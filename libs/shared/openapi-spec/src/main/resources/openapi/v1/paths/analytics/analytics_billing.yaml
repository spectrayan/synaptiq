get:
  operationId: getBilling
  summary: Get billing info
  tags: [Analytics]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
    - name: from
      in: query
      schema:
        type: string
        format: date
    - name: to
      in: query
      schema:
        type: string
        format: date
  responses:
    '200':
      description: Billing data
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/analytics/BillingResponse.yaml'

    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'