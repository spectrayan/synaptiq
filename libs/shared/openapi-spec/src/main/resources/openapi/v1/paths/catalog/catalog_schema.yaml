get:
  operationId: getActiveSchema
  summary: Get active catalog schema
  tags: [Catalog]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
  responses:
    '200':
      description: Active schema
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/catalog/CatalogSchemaResponse.yaml'

    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'