post:
  operationId: executeWorkflow
  summary: Execute a workflow (SSE streaming response)
  tags: [Workflows]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/workflow/ExecuteWorkflowRequest.yaml'
  responses:
    '200':
      description: SSE stream of execution events
      content:
        text/event-stream:
          schema:
            type: string
            description: Server-Sent Events stream with node status updates

    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'