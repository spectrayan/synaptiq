get:
  operationId: getWorkflowRunDetail
  summary: Get detailed execution result of a specific run
  tags: [Workflows]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
    - name: runId
      in: path
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Full run detail with per-node results
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/workflow/WorkflowRunDetail.yaml'
    '404':
      description: Run not found

    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'