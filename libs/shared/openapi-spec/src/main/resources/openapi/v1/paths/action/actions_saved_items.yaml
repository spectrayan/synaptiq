get:
  operationId: listSavedItems
  summary: List saved items
  tags: [Actions]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
    - name: sessionId
      in: query
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Saved items list
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/action/SavedItemListResponse.yaml'

    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'