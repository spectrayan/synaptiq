post:
  operationId: deactivateIntegration
  summary: Deactivate an integration route
  description: Stops and removes the integration route from the Camel engine
  tags: [Integrations]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
    - name: routeConfigId
      in: path
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Integration deactivated
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/integration/IntegrationResponse.yaml'
    '400':
      $ref: '../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../components/responses/Unauthorized.yaml'
    '404':
      $ref: '../../components/responses/NotFound.yaml'
    '500':
      $ref: '../../components/responses/InternalServerError.yaml'
