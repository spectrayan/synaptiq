get:
  operationId: getAiConfig
  summary: Get ai config
  tags: [Config]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
  responses:
    '200':
      description: Config data
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/config/AiPersonaResponse.yaml'
patch:
  operationId: updateAiConfig
  summary: Update ai config
  tags: [Config]
  parameters:
    - $ref: '../../components/parameters/TenantIdHeader.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/config/AiPersonaResponse.yaml'
  responses:
    '200':
      description: Config updated
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/config/AiPersonaResponse.yaml'
