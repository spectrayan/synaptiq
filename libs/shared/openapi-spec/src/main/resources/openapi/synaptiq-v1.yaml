tags:
  - name: Auth
    description: Authentication — signup, login, token management
  - name: Tenants
    description: Tenant lifecycle — creation, configuration, admin management
  - name: Catalog
    description: Catalog Registry — schema management, item CRUD, embedding
  - name: Chat
    description: Conversational AI — sessions, messages, context management
  - name: Actions
    description: Actions — execution, saved items
  - name: Workflows
    description: Workflow Engine — agent-flow generation, execution, sharing
  - name: Analytics
    description: Analytics — usage metrics, token tracking, billing
  - name: Branding
    description: Branding — theming, personalization, visual identity
  - name: Config
    description: Tenant Configuration — AI persona, guardrails, LLM provider, components
  - name: SchemaRegistry
    description: Schema Registry — collection inspection, dynamic queries
  - name: Health
    description: Health checks — liveness and readiness probes
  - name: Applications
    description: Application lifecycle — create, read, delete application configurations
  - name: DataSources
    description: DataSource management — create, read, delete data source connections

