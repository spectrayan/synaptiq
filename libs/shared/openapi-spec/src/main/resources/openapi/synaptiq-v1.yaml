openapi: 3.1.0
info:
  title: Synaptiq API
  description: |
    AI-Powered Conversational Commerce Platform — REST API

    Synaptiq enables businesses to deploy intelligent, context-aware AI shopping assistants
    with full catalog management, conversation orchestration, workflow automation,
    and multi-tenant governance. This specification covers all bounded contexts:
    Authentication, Tenants, Catalog, Chat, Actions, Workflows, Analytics,
    Branding, Tenant Configuration, and Schema Registry.
  version: 1.0.0
  contact:
    name: Synaptiq Team
    url: https://synaptiq.dev
  license:
    name: Proprietary
    url: https://synaptiq.dev/license

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://api.synaptiq.dev
    description: Production server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
