        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantIdHeader:
      name: X-Tenant-ID
      in: header
      required: false
      description: The tenant identifier for multi-tenant isolation
      schema:
        type: string
        minLength: 1
        maxLength: 100
  schemas:
    TenantStatus:
      type: string
      description: Tenant lifecycle status
      enum:
        - ACTIVE
        - SUSPENDED
        - TRIAL
        - ONBOARDING
    AccessMode:
      type: string
      description: Tenant access mode
      enum:
        - PUBLIC
        - UNLISTED
        - PROTECTED
        - AUTHENTICATED
    AdminRole:
      type: string
      description: Admin role within a tenant
      enum:
        - OWNER
        - EDITOR
        - VIEWER
    ActionOutcome:
      type: string
      description: Outcome of an action execution
      enum:
        - SUCCESS
        - FAILURE
        - PENDING
        - SKIPPED
    ConversationRole:
      type: string
      description: Role in a conversation turn
      enum:
        - USER
        - ASSISTANT
        - SYSTEM
    ProblemDetails:
      type: object
      description: RFC 9457 Problem Details for HTTP APIs
      properties:
        type:
          type: string
          format: uri
          description: URI reference identifying the problem type
        title:
          type: string
          description: Short human-readable summary
        status:
          type: integer
          format: int32
          description: HTTP status code
        detail:
          type: string
          description: Human-readable explanation
        instance:
          type: string
          format: uri
          description: URI reference identifying the specific occurrence
        code:
          type: string
          description: Machine-readable error code for frontend translation
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the error
        traceId:
          type: string
          description: Unique identifier for request tracing
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
      required:
        - type
        - title
        - status
    ValidationError:
      type: object
      properties:
        field:
          type: string
        message:
          type: string
        rejectedValue:
          type: string
        code:
          type: string
    SignupRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          minLength: 5
          maxLength: 255
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    AuthTokenResponse:
      type: object
      properties:
        idToken:
          type: string
          description: JWT identity token
        refreshToken:
          type: string
          description: Opaque refresh token
        expiresIn:
          type: integer
          description: Token lifetime in seconds
    UserResponse:
      type: object
      properties:
        uid:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        role:
          type: string
        emailVerified:
          type: boolean
        tenantId:
          type: string
    ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          format: password
          minLength: 1
          maxLength: 128
        newPassword:
          type: string
          format: password
          minLength: 8
          maxLength: 128
    UpdateRoleRequest:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          description: New role for the user
    CreateTenantRequest:
      type: object
      required:
        - tenantId
        - name
        - slug
      properties:
        tenantId:
          type: string
          minLength: 1
          maxLength: 100
        name:
          type: string
          minLength: 1
          maxLength: 200
        slug:
          type: string
          minLength: 1
          maxLength: 100
        displayLabel:
          type: string
          maxLength: 100
        accessMode:
          $ref: '#/components/schemas/AccessMode'
    TenantResponse:
      type: object
      properties:
        tenantId:
          type: string
        name:
          type: string
        slug:
          type: string
        status:
          $ref: '#/components/schemas/TenantStatus'
        accessMode:
          $ref: '#/components/schemas/AccessMode'
        displayLabel:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    TenantLimitsResponse:
      type: object
      properties:
        maxCatalogItems:
          type: integer
        maxMonthlyTokens:
          type: integer
        maxUsers:
          type: integer
        maxRequestsPerMinute:
          type: integer
        seatCap:
          type: integer
    TenantAdminResponse:
      type: object
      properties:
        uid:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/AdminRole'
        invitedAt:
          type: string
          format: date-time
        accepted:
          type: boolean
    InviteAdminRequest:
      type: object
      required:
        - email
        - role
      properties:
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/AdminRole'
    UpdateTenantRequest:
      type: object
      description: Partial update for tenant org-level fields. All fields are optional.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        slug:
          type: string
          minLength: 1
          maxLength: 100
        displayLabel:
          type: string
          maxLength: 100
        accessMode:
          $ref: '#/components/schemas/AccessMode'
        planTier:
          $ref: '#/components/schemas/PlanTier'
        dbConnectionUri:
          type: string
          description: MongoDB connection URI for tenant-isolated database
          maxLength: 500
    PlanTier:
      type: string
      description: Subscription plan tier
      enum:
        - FREE
        - GROWTH
        - ENTERPRISE
    ApplicationResponse:
      type: object
      description: Full application configuration response
      properties:
        appId:
          type: string
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        isDefault:
          type: boolean
        status:
          $ref: '#/components/schemas/ApplicationStatus'
        aiPersona:
          $ref: '#/components/schemas/AiPersonaResponse'
        guardrails:
          $ref: '#/components/schemas/GuardrailsResponse'
        branding:
          $ref: '#/components/schemas/BrandingResponse'
        components:
          $ref: '#/components/schemas/ComponentsToggleResponse'
        actions:
          $ref: '#/components/schemas/ActionsConfigResponse'
        personalization:
          $ref: '#/components/schemas/PersonalizationResponse'
        themes:
          type: array
          items:
            $ref: '#/components/schemas/ThemePresetResponse'
        dataSourceIds:
          type: array
          items:
            type: string
        llmOverride:
          $ref: '#/components/schemas/LlmProviderResponse'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateApplicationRequest:
      type: object
      description: Create a new application
      required:
        - name
        - slug
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        slug:
          type: string
          minLength: 1
          maxLength: 100
          pattern: ^[a-z0-9-]+$
        description:
          type: string
          maxLength: 500
        icon:
          type: string
          maxLength: 100
        isDefault:
          type: boolean
          default: false
        aiPersona:
