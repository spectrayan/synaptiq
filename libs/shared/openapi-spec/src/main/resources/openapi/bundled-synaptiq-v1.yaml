          description: 'Parameter type: string, number, boolean, secret, cron'
        required:
          type: boolean
        defaultValue:
          type: string
        placeholder:
          type: string
    CreateRoleRequest:
      type: object
      required:
        - slug
        - displayName
        - scopeSlugs
      properties:
        slug:
          type: string
          description: Unique role identifier, e.g. "custom:marketing-editor"
          minLength: 3
          maxLength: 100
        displayName:
          type: string
          description: Human-readable name for admin UI
          minLength: 1
          maxLength: 100
        description:
          type: string
          description: Role description for admin UI
          maxLength: 500
        scopeSlugs:
          type: array
          description: List of scope slugs this role grants
          items:
            type: string
          minItems: 1
    UpdateCustomRoleRequest:
      type: object
      properties:
        displayName:
          type: string
          description: Updated display name
          minLength: 1
          maxLength: 100
        description:
          type: string
          description: Updated description
          maxLength: 500
        scopeSlugs:
          type: array
          description: Updated scope slugs this role grants
          items:
            type: string
          minItems: 1
    RoleResponse:
      type: object
      required:
        - id
        - slug
        - displayName
        - systemRole
        - roleType
        - scopeSlugs
      properties:
        id:
          type: string
          description: Unique role ID
        slug:
          type: string
          description: Stable role identifier
        tenantId:
          type: string
          description: Owning tenant ID, null for global roles
        displayName:
          type: string
          description: Human-readable role name
        description:
          type: string
          description: Role description
        systemRole:
          type: boolean
          description: Whether this role is system-managed (immutable)
        roleType:
          type: string
          description: Role type, either global or tenant
          enum:
            - global
            - tenant
        scopeSlugs:
          type: array
          description: Scope slugs granted by this role
          items:
            type: string
    ScopeResponse:
      type: object
      required:
        - slug
        - displayName
        - resource
        - action
      properties:
        slug:
          type: string
          description: Scope identifier, e.g. workflow:create
        displayName:
          type: string
          description: Human-readable scope name
        description:
          type: string
          description: Scope description
        resource:
          type: string
          description: Resource category, e.g. workflow
        action:
          type: string
          description: Action within the resource, e.g. create
    ItemSnapshotResponse:
      type: object
      description: Snapshot of a saved item at the time it was bookmarked
      properties:
        title:
          type: string
        subtitle:
          type: string
        imageUrl:
          type: string
        description:
          type: string
        price:
          type: string
        category:
          type: string
        dataSourceId:
          type: string
        sourceItemId:
          type: string
