version: 2
updates:
  # Check for updates to Maven dependencies
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "com.spectrayan.synaptiq:*" # Ignore internal modules if published

  # Check for updates to Node.js/pnpm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Check for updates to GitHub Actions in workflow files
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
