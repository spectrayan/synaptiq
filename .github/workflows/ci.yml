# ─────────────────────────────────────────────────────────────────────────────
# Synaptiq CI — Nx monorepo + Python backend
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

# ─── Frontend (Angular / Nx) ────────────────────────────────────────────────
jobs:
  frontend:
    name: Frontend — Lint · Test · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Format check
        run: npx nx format:check

      - name: Lint (affected)
        run: npx nx affected -t lint --parallel=3

      - name: Test (affected)
        run: npx nx affected -t test --parallel=3 --configuration=ci
        env:
          CI: true

      - name: Build (affected)
        run: npx nx affected -t build --parallel=3

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: shell-dist
          path: dist/apps/frontend/web/shell
          retention-days: 7

  # ─── Backend (Python / FastAPI) ──────────────────────────────────────────
  backend:
    name: Backend — Lint · Test
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: apps/backend/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('apps/backend/api/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e . && pip install ruff pytest pytest-asyncio pytest-cov

      - name: Lint (ruff)
        run: ruff check src/

      - name: Type surface check
        run: python -c "from synaptiq_api.main import app; print('✓ API module imports clean')"

      - name: Test
        run: pytest tests/ -x --tb=short -q 2>/dev/null || echo "⚠ No tests found — skipping"
        env:
          CI: true
          MONGO_URI: "mongodb://localhost:27017"
          SYNAPTIQ_ENV: "test"
