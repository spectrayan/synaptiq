# ─────────────────────────────────────────────────────────────────────────────
# Synaptiq CI — Build & Test (required checks)
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  packages: read

# ─── Frontend (Angular / Nx) ────────────────────────────────────────────────
jobs:
  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (affected)
        run: npx nx affected -t build --parallel=3 --exclude='spring-apis,agent-flow-spring,camel-integration,openapi-spec,synaptiq-apis'

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: shell-dist
          path: dist/apps/frontend/web/shell
          retention-days: 7

  # ─── Backend (Java / Spring Boot) ────────────────────────────────────────
  backend:
    name: Backend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: spectrayan-github-server-sent-events
          server-username: GITHUB_ACTOR
          server-password: GH_PKG_TOKEN

      - name: Build full reactor (skip tests)
        run: mvn clean install -DskipTests -B -q
        env:
          GH_PKG_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Upload JAR artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: spring-apis-jar
          path: apps/backend/spring-apis/target/spring-apis-*.jar
          retention-days: 7
