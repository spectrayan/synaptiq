<header class="topbar sq-glass">
  @if (!sidebarOpen() || isMobile()) {
    <button mat-icon-button (click)="toggleSidebar.emit()" matTooltip="Open sidebar">
      <mat-icon>menu</mat-icon>
    </button>
  }

  <!-- Tab navigation (replaces "AI Assistant" title) -->
  <nav class="topbar-tabs" aria-label="Main content tabs">
    <button
      class="topbar-tab"
      [class.active]="activeTab() === 'chat'"
      (click)="tabChange.emit('chat')"
    >
      <mat-icon>chat</mat-icon>
      <span>Chat</span>
    </button>
    <button
      class="topbar-tab"
      [class.active]="activeTab() === 'workflow'"
      (click)="tabChange.emit('workflow')"
    >
      <mat-icon>account_tree</mat-icon>
      <span>Workflow</span>
      @if (workflowGenerating()) {
        <span class="tab-pulse"></span>
      }
      @if (hasActiveWorkflow()) {
        <span class="tab-dot"></span>
      }
    </button>
  </nav>

  <!-- Spacer -->
  <div class="topbar-spacer"></div>

  <!-- Right-side actions -->
  <div class="topbar-actions">
    @if (isAdminMode()) {
      <span class="mode-badge admin">⚙ Admin</span>
    }
    @if (!isAuthenticated()) {
      <button class="auth-btn-inline" (click)="openAuth.emit('signin')">Sign in</button>
      <button class="auth-btn-inline signup" (click)="openAuth.emit('signup')">Sign up</button>
    }
    <span class="mode-badge" [class.live]="useBackend()">
      {{ useBackend() ? '● Live' : '○ Demo' }}
    </span>
    <button mat-icon-button
            [matTooltip]="isDark() ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
            (click)="toggleTheme.emit()">
      <mat-icon>{{ isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>
    <button mat-icon-button matTooltip="Settings" (click)="openSettings.emit()">
      <mat-icon>settings</mat-icon>
    </button>
  </div>
</header>
