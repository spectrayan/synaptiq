# ═══════════════════════════════════════════════════════════════════
# Dev-Ollama profile — local development with Ollama LLM
# Activated via: mvn spring-boot:run -Dspring-boot.run.profiles=dev,dev-ollama
#
# Requires Ollama running on localhost:11434
# Overrides the dev profile's Gemini config with Ollama.
# ═══════════════════════════════════════════════════════════════════

spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingAutoConfiguration
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:qwen3-embedding}
      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:llama3.2}
