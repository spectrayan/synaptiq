# ═══════════════════════════════════════════════════════════════════
# Dev profile — local development overrides
# Activated via: mvn spring-boot:run -Dspring-boot.run.profiles=dev
#
# LLM: Uses Google GenAI (Gemini) by default. Set GOOGLE_API_KEY env var.
#       For Ollama, use the 'dev-ollama' profile instead.
# ═══════════════════════════════════════════════════════════════════

spring:
  autoconfigure:
    exclude:
      # Only exclude Ollama chat — Gemini is used for chat.
      # Ollama embedding stays active to provide EmbeddingModel for MongoDB VectorStore.
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
  ai:
    google:
      genai:
        api-key: ${GOOGLE_API_KEY:}
        chat:
          options:
            model: ${GEMINI_CHAT_MODEL:gemini-2.5-flash}
            temperature: 0.7
    # Ollama provides EmbeddingModel for MongoDB VectorStore.
    # The bean is created eagerly; calls fail gracefully if Ollama isn't running.
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
    vectorstore:
      mongodb:
        initialize-schema: false
  data:
    mongodb:
      uri: mongodb://localhost:27017/synaptiq
      database: synaptiq
    redis:
      url: redis://localhost:6379

synaptiq:
  debug: true
  environment: development
  cors-origins: http://localhost:4200,http://localhost:4201
  auth:
    provider: builtin
    jwt-secret: synaptiq-local-dev-secret-change-in-prod
    firebase-auth-emulator-host: localhost:9099

logging:
  level:
    com.spectrayan.synaptiq: DEBUG
    org.springframework.data.mongodb.core.ReactiveMongoTemplate: DEBUG
