# ═══════════════════════════════════════════════════════════════════
# Synaptiq — Spring Boot Application Configuration
# ═══════════════════════════════════════════════════════════════════

spring:
  application:
    name: synaptiq-spring-apis
  main:
    web-application-type: reactive

  # ── MongoDB ───────────────────────────────────────────────────────
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/synaptiq}
      database: ${MONGODB_DATABASE:synaptiq}

  # ── Redis ─────────────────────────────────────────────────────────
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  # ── Security (OAuth2 Resource Server) ─────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          # For Firebase: use https://securetoken.google.com/<project-id>
          # For builtin: this is overridden by the custom JWT decoder
          issuer-uri: ${JWT_ISSUER_URI:}



  # ── Spring AI ─────────────────────────────────────────────────────
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            model: ${GEMINI_MODEL:gemini-2.5-flash}
            temperature: 0.7
        embedding:
          options:
            model: ${GEMINI_EMBEDDING_MODEL:text-embedding-004}
    vectorstore:
      mongodb:
        initialize-schema: true
        collection-name: knowledge_vectors
        index-name: knowledge_vector_index
        path-name: embedding
        metadata-fields-to-filter:
          - tenantId
          - categoryId
          - tags
    mcp:
      server:
        name: synaptiq-mcp
        version: 1.0.0

# ── Synaptiq Custom Properties ─────────────────────────────────────
synaptiq:
  debug: ${DEBUG:true}
  environment: ${ENVIRONMENT:development}
  cors-origins: ${SYNAPTIQ_CORS_ORIGINS:http://localhost:4200}
  base-domain: ${BASE_DOMAIN:spectrayan.com}
  mongo:
    uri: ${MONGODB_URI:mongodb://localhost:27017}
    database: ${MONGODB_DATABASE:synaptiq}
  redis:
    url: ${REDIS_URL:redis://localhost:6379}
    chat-session-ttl-seconds: 7200
  auth:
    provider: ${AUTH_PROVIDER:builtin}
    jwt-secret: ${JWT_SECRET:synaptiq-local-dev-secret-change-in-prod}
    jwt-expiry-hours: 24
    firebase-project-id: ${FIREBASE_PROJECT_ID:}
    firebase-auth-emulator-host: ${FIREBASE_AUTH_EMULATOR_HOST:}
  security:
    jwt:
      role-claim: ${JWT_ROLE_CLAIM:role}          # Keycloak: realm_access.roles[0]
      tenant-claim: ${JWT_TENANT_CLAIM:tenantId}  # Auth0: https://app.example.com/tenantId
  llm:
    default-provider: ${LLM_DEFAULT_PROVIDER:vertexai}
    vertexai-project: ${VERTEX_AI_PROJECT:}
    vertexai-location: ${VERTEX_AI_LOCATION:us-central1}
    gemini-api-key: ${GEMINI_API_KEY:}
    gemini-model: ${GEMINI_MODEL:gemini-2.5-flash}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:false}
    requests-per-second: ${RATE_LIMIT_RPS:100}
    login-requests-per-minute: ${RATE_LIMIT_LOGIN_RPM:5}
    timeout: 0
  cache:
    type: ${SYNAPTIQ_CACHE_TYPE:caffeine}   # caffeine (default) or redis

# ── Resilience4j ───────────────────────────────────────────────────
resilience4j:
  retry:
    instances:
      llm-gemini:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - java.util.concurrent.TimeoutException

# ── Spectrayan SSE Server Library ──────────────────────────────────
spectrayan:
  sse:
    server:
      enabled: true
      base-path: /api/v1/sse
      stream:
        heartbeat-enabled: true
        heartbeat-interval: 15s
        connected-event-enabled: true
        retry-enabled: true
        retry: 3s
      topics:
        idle-ttl: 5m
      metrics:
        enabled: true
        per-topic: true
      emitter:
        sink-type: REPLAY
        replay-size: 5
      cors:
        enabled: true
        allowed-origins:
          - "http://localhost:4200"
          - "http://localhost:8080"
        allowed-methods:
          - GET
        allow-credentials: true

# ── Server ──────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}

# ── Actuator ────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,modulith
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ─────────────────────────────────────────────────────────
logging:
  level:
    com.spectrayan.synaptiq: DEBUG
    org.springframework.data.mongodb: WARN
    org.springframework.security: WARN

# ── SpringDoc ───────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  show-actuator: true
