# Synaptiq — Local Development Stack
# Usage: docker compose up -d
#
# Services:
#   - mongodb     : MongoDB Atlas Local (supports vector search + replica set)
#   - redis       : Redis 7 for rate limiting and prompt caching
#   - firebase-auth : Firebase Auth Emulator (no real credentials needed)
#   - spring-apis : Spring Boot 4 backend (WebFlux + Modulith)
#   - seed        : One-shot seeder for demo tenant + catalog data (Python utility)
#
# The Angular frontend runs outside Docker via `pnpm nx serve shell`

services:
  # ── MongoDB Atlas Local ────────────────────────────────────────────────
  mongodb:
    image: mongodb/mongodb-atlas-local:8.0
    pull_policy: if_not_present
    container_name: synaptiq-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:8.6.1
    pull_policy: if_not_present
    container_name: synaptiq-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Firebase Auth Emulator ─────────────────────────────────────────────
  firebase-auth:
    image: node:22-alpine
    pull_policy: if_not_present
    container_name: synaptiq-firebase-auth
    working_dir: /srv/firebase
    entrypoint: /bin/sh
    command:
      - -c
      - |
        printf '{"emulators":{"auth":{"host":"0.0.0.0","port":9099},"ui":{"enabled":true,"host":"0.0.0.0","port":4000},"hub":{"host":"0.0.0.0","port":4400}}}' > firebase.json &&
        npm install -g firebase-tools@latest &&
        firebase emulators:start --only auth --project synaptiq-dev
    ports:
      - "9099:9099" # Auth Emulator
      - "4000:4000" # Emulator Suite UI
    environment:
      - FIREBASE_CONFIG={"projectId":"synaptiq-dev"}
    volumes:
      - firebase_data:/srv/firebase
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:9099/" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Spring Boot Backend ────────────────────────────────────────────────
  spring-apis:
    build:
      context: ./apps/backend/spring-apis
      dockerfile: Dockerfile
    container_name: synaptiq-spring-apis
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/synaptiq
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - FIREBASE_AUTH_EMULATOR_HOST=firebase-auth:9099
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      firebase-auth:
        condition: service_healthy
    restart: unless-stopped

  # ── One-shot seed runner ───────────────────────────────────────────────
  # Populates demo tenant + catalog data on first start.
  # Uses the Python seed scripts as a standalone utility.
  seed:
    image: python:3.12-slim
    container_name: synaptiq-seed
    working_dir: /app
    entrypoint: ["sh", "-c"]
    command:
      - |
        pip install --no-cache-dir pymongo &&
        python seed-data/seed_all.py
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
    volumes:
      - ./seed-data:/app/seed-data:ro
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"

volumes:
  mongo_data:
  redis_data:
  firebase_data:
