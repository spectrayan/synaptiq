version: '3.9'

services:
  mongodb:
    image: mongodb/mongodb-atlas-local:latest
    container_name: synaptiq-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: synaptiq-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    build:
      context: ./apps/backend/api
      dockerfile: Dockerfile
    container_name: synaptiq-api
    ports:
      - "8000:8080"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379
      - DEBUG=true
      - ENVIRONMENT=development
    env_file:
      - ./apps/backend/api/.env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend/api/src:/app/src

  # One-shot seed runner — populates demo tenant + catalog on first start
  seed:
    build:
      context: ./apps/backend/api
      dockerfile: Dockerfile
    container_name: synaptiq-seed
    entrypoint: ["uv", "run", "python", "-m", "synaptiq_api.scripts.seed_dev"]
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=development
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

volumes:
  mongo_data:
  redis_data:
